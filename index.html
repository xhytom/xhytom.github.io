<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="xhytom 的个人主页">
  <title>xhytom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0e17;
      --bg-card: #111827;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --accent: #38bdf8;
      --accent-dim: rgba(56, 189, 248, 0.15);
      --font-sans: "Noto Sans SC", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, monospace;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(56, 189, 248, 0.12), transparent),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(99, 102, 241, 0.08), transparent);
      pointer-events: none;
      z-index: -1;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    header {
      padding: 2rem 0;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: var(--font-mono);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.875rem;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--text);
    }

    main {
      padding-bottom: 4rem;
    }

    .hero {
      padding: 4rem 0 3rem;
      animation: fadeUp 0.8s ease-out;
    }

    .hero-greeting {
      font-family: var(--font-mono);
      font-size: 0.875rem;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }

    .hero h1 {
      font-size: clamp(2.25rem, 6vw, 3.25rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 1.25rem;
    }

    .hero p {
      font-size: 1.05rem;
      color: var(--text-muted);
      max-width: 540px;
    }

    section {
      margin-top: 3rem;
      animation: fadeUp 0.8s ease-out backwards;
    }

    section:nth-of-type(1) { animation-delay: 0.1s; }
    section:nth-of-type(2) { animation-delay: 0.2s; }
    section:nth-of-type(3) { animation-delay: 0.3s; }

    .section-title {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
    }

    .section-title::before {
      content: "// ";
      opacity: 0.6;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
    }

    .card p + p {
      margin-top: 0.75rem;
    }

    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.75rem;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
    }

    .link-item:hover {
      border-color: rgba(56, 189, 248, 0.4);
      background: var(--accent-dim);
      transform: translateY(-2px);
    }

    .link-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      color: var(--accent);
    }

    .link-label {
      font-size: 0.875rem;
      font-weight: 500;
    }

    .link-desc {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .tag {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      padding: 0.35rem 0.75rem;
      background: var(--accent-dim);
      color: var(--accent);
      border-radius: 6px;
      border: 1px solid rgba(56, 189, 248, 0.2);
    }

    footer {
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8rem;
      font-family: var(--font-mono);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      .nav-links {
        gap: 1rem;
      }

      .hero {
        padding-top: 2.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <nav>
        <a href="#" class="logo">xhytom</a>
        <ul class="nav-links">
          <li><a href="#about">关于</a></li>
          <li><a href="#links">链接</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="hero">
        <p class="hero-greeting">你好，我是</p>
        <h1>xhytom</h1>
        <p>开发者 · 探索代码与算法的边界。这里是我的个人主页，记录项目、想法与日常。</p>
      </section>

      <section id="about">
        <h2 class="section-title">关于我</h2>
        <div class="card">
          <p>热爱编程与问题解决，关注算法竞赛、开源项目与 Web 开发。</p>
          <p>欢迎通过下方链接与我交流，或查看 GitHub 上的代码与项目。</p>
          <div class="tags">
            <span class="tag">算法</span>
            <span class="tag">Web</span>
            <span class="tag">开源</span>
          </div>
        </div>
      </section>

      <section id="links">
        <h2 class="section-title">链接</h2>
        <div class="links-grid">
          <a class="link-item" href="https://github.com/xhytom" target="_blank" rel="noopener noreferrer">
            <svg class="link-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
            </svg>
            <div>
              <div class="link-label">GitHub</div>
              <div class="link-desc">github.com/xhytom</div>
            </div>
          </a>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 xhytom</p>
    </footer>
  </div>
</body>
</html>
