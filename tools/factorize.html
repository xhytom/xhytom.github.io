<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pollard-Rho 大整数质因数分解器 | 高精度算法演示</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'SF Pro Text', 'Inter', 'Roboto', monospace;
        }

        body {
            background: linear-gradient(145deg, #f5f7fc 0%, #eef2f8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 1.5rem;
        }

        .card {
            max-width: 860px;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(2px);
            border-radius: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), 0 4px 12px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .header {
            background: #0a0f1c;
            background: linear-gradient(135deg, #10182f 0%, #1a253f 100%);
            padding: 1.8rem 2rem;
            color: white;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }

        .back-link {
            color: rgba(255, 255, 255, 0.75);
            text-decoration: none;
            font-size: 0.85rem;
            white-space: nowrap;
            padding: 0.35rem 0.75rem;
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s;
        }

        .back-link:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            margin: 0;
            font-weight: 600;
            font-size: 1.9rem;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1:before {
            content: "🧮";
            font-size: 1.9rem;
        }

        .header p {
            margin: 0.6rem 0 0;
            opacity: 0.8;
            font-size: 0.9rem;
            font-family: monospace;
        }

        .content {
            padding: 2rem 2rem 2rem 2rem;
        }

        .input-area {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-bottom: 2rem;
        }

        label {
            font-weight: 600;
            color: #1e2a3e;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }

        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        #numberInput {
            flex: 4;
            padding: 1rem 1.2rem;
            font-size: 1.1rem;
            font-family: 'SF Mono', 'Fira Code', monospace;
            background: #fefefe;
            border: 2px solid #dce5f0;
            border-radius: 2rem;
            transition: 0.2s;
            outline: none;
            font-weight: 500;
            color: #0a2540;
        }

        #numberInput:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        button {
            background: #1e293b;
            border: none;
            padding: 0.9rem 1.8rem;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 2.5rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button#factorBtn {
            background: #0f2b3d;
            flex: 1;
            justify-content: center;
        }

        button#factorBtn:hover {
            background: #1e3a5f;
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.15);
        }

        button:disabled {
            cursor: not-allowed;
        }

        button:active {
            transform: translateY(1px);
        }

        .example-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 6px;
        }

        .example-btn {
            background: #e9eef3;
            color: #1e293b;
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
            font-family: monospace;
            font-weight: 500;
            box-shadow: none;
        }

        .example-btn:hover {
            background: #d4dfec;
            color: #0f172a;
        }

        .result-area {
            background: #f8fafd;
            border-radius: 1.8rem;
            padding: 1.5rem;
            margin-top: 1rem;
            border: 1px solid #e2edf7;
            box-shadow: inset 0 1px 2px #00000008, 0 6px 12px -6px rgba(0, 0, 0, 0.05);
        }

        .result-header {
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #4b6b8f;
            margin-bottom: 0.8rem;
        }

        #resultDisplay {
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: 1.15rem;
            word-break: break-word;
            white-space: pre-wrap;
            line-height: 1.5;
            color: #0c2b3b;
            font-weight: 500;
        }

        .status {
            font-size: 0.85rem;
            margin-top: 1rem;
            color: #4b6b8f;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #b9d0f0;
            border-radius: 50%;
            border-top-color: #1e4a76;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error {
            color: #c2410c;
            background: #fff1f0;
            padding: 0.6rem 1rem;
            border-radius: 2rem;
            font-size: 0.85rem;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            padding: 1rem 2rem 1.5rem;
            color: #7e8b9e;
            border-top: 1px solid #eef2f8;
        }

        @media (max-width: 600px) {
            .content {
                padding: 1.5rem;
            }

            .input-group {
                flex-direction: column;
                align-items: stretch;
            }

            button#factorBtn {
                width: 100%;
            }

            .header-top {
                flex-direction: column-reverse;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="header">
            <div class="header-top">
                <div>
                    <h1>Pollard-Rho 质因数分解</h1>
                    <p>基于 Miller-Rabin 素性测试 + 随机化启发式算法 | 支持超大整数 (BigInt)</p>
                </div>
                <a href="../index.html" class="back-link">← 返回主页</a>
            </div>
        </div>
        <div class="content">
            <div class="input-area">
                <label>🔢 输入正整数 (支持任意大整数)</label>
                <div class="input-group">
                    <input type="text" id="numberInput" placeholder="例如: 12345678901234567890123456789"
                        value="1234567890123456789">
                    <button id="factorBtn">✨ 分解质因数</button>
                </div>
                <div class="example-buttons">
                    <button class="example-btn" data-num="2">2</button>
                    <button class="example-btn" data-num="123456789">123456789</button>
                    <button class="example-btn" data-num="1111111111111111111">19个1 (大数)</button>
                    <button class="example-btn" data-num="1000000007">质数 1e9+7</button>
                    <button class="example-btn" data-num="2**64-1">2^64-1</button>
                    <button class="example-btn" data-num="9736713594901111241">随机半素数</button>
                </div>
            </div>

            <div class="result-area">
                <div class="result-header">📐 分解结果</div>
                <div id="resultDisplay">— 等待分解 —</div>
                <div id="statusMsg" class="status"></div>
            </div>
        </div>
        <footer>
            ⚡ Pollard-Rho 概率性算法 | 分解大质数需时稍长 (浏览器内计算) | 结果以质因数幂形式呈现
        </footer>
    </div>

    <script>
        (function () {
            const SMALL_PRIMES = [2n, 3n, 5n, 7n, 11n, 13n, 17n, 19n, 23n, 29n, 31n, 37n, 41n, 43n, 47n, 53n, 59n, 61n, 67n, 71n, 73n, 79n, 83n, 89n, 97n, 101n, 103n, 107n, 109n, 113n];

            function gcd(a, b) {
                while (b !== 0n) {
                    let t = a % b;
                    a = b;
                    b = t;
                }
                return a;
            }

            function modPow(base, exp, mod) {
                if (mod === 1n) return 0n;
                let result = 1n;
                base = base % mod;
                let e = exp;
                while (e > 0n) {
                    if (e & 1n) result = (result * base) % mod;
                    base = (base * base) % mod;
                    e >>= 1n;
                }
                return result;
            }

            function randomBigIntUnder(max) {
                if (max <= 1n) return 0n;
                const bitLength = max.toString(2).length;
                const byteLength = Math.ceil(bitLength / 8) + 1;
                const buffer = new Uint8Array(byteLength);
                let candidate;
                do {
                    window.crypto.getRandomValues(buffer);
                    let hex = '';
                    for (let i = 0; i < buffer.length; i++) {
                        hex += buffer[i].toString(16).padStart(2, '0');
                    }
                    candidate = BigInt('0x' + hex);
                } while (candidate >= max);
                return candidate;
            }

            function randomRange(min, max) {
                if (min >= max) return min;
                const range = max - min;
                const rand = randomBigIntUnder(range);
                return min + rand;
            }

            function isPrime(n, k = 12) {
                if (n <= 1n) return false;
                if (n === 2n || n === 3n) return true;
                if (n % 2n === 0n) return false;

                for (let p of SMALL_PRIMES) {
                    if (n === p) return true;
                    if (n % p === 0n) return false;
                }

                let d = n - 1n;
                let s = 0n;
                while (d % 2n === 0n) {
                    d >>= 1n;
                    s++;
                }

                witnessLoop: for (let i = 0; i < k; i++) {
                    const a = randomRange(2n, n - 1n);
                    let x = modPow(a, d, n);
                    if (x === 1n || x === n - 1n) continue;
                    for (let r = 1n; r < s; r++) {
                        x = (x * x) % n;
                        if (x === n - 1n) continue witnessLoop;
                        if (x === 1n) return false;
                    }
                    return false;
                }
                return true;
            }

            function pollardRho(n) {
                if (n % 2n === 0n) return 2n;
                if (n % 3n === 0n) return 3n;
                if (isPrime(n)) return n;

                const limit = 100;
                for (let attempt = 0; attempt < limit; attempt++) {
                    let c = randomRange(1n, n - 1n);
                    let x = randomRange(2n, n - 1n);
                    let y = x;
                    let d = 1n;
                    while (d === 1n) {
                        x = ((x * x) % n + c) % n;
                        y = ((y * y) % n + c) % n;
                        y = ((y * y) % n + c) % n;
                        d = gcd(x > y ? x - y : y - x, n);
                        if (d === n) break;
                    }
                    if (d !== 1n && d !== n) {
                        return d;
                    }
                }
                return n;
            }

            function trialDivideSmallPrimes(num, factorList) {
                let n = num;
                for (let p of SMALL_PRIMES) {
                    if (p * p > n) break;
                    while (n % p === 0n) {
                        factorList.push(p);
                        n /= p;
                    }
                }
                return n;
            }

            function factorizeRecursive(n, factorList) {
                if (n === 1n) return;
                if (isPrime(n)) {
                    factorList.push(n);
                    return;
                }
                let divisor = pollardRho(n);
                if (divisor === n || divisor === 1n) {
                    for (let i = 2n; i <= 100n; i++) {
                        if (n % i === 0n) {
                            divisor = i;
                            break;
                        }
                    }
                    if (divisor === n || divisor === 1n) {
                        factorList.push(n);
                        return;
                    }
                }
                factorizeRecursive(divisor, factorList);
                factorizeRecursive(n / divisor, factorList);
            }

            function factorizeInteger(num) {
                if (num <= 1n) return [];
                let factors = [];
                let remaining = trialDivideSmallPrimes(num, factors);
                if (remaining > 1n) {
                    if (isPrime(remaining)) {
                        factors.push(remaining);
                    } else {
                        factorizeRecursive(remaining, factors);
                    }
                }
                factors.sort((a, b) => (a < b ? -1 : (a > b ? 1 : 0)));
                return factors;
            }

            function formatFactorization(factors) {
                if (!factors.length) return "1 (平凡整数)";
                const groups = [];
                let i = 0;
                while (i < factors.length) {
                    let base = factors[i];
                    let cnt = 1;
                    while (i + cnt < factors.length && factors[i + cnt] === base) cnt++;
                    if (cnt === 1) groups.push(`${base}`);
                    else groups.push(`${base}^${cnt}`);
                    i += cnt;
                }
                return groups.join(' · ');
            }

            const numberInput = document.getElementById('numberInput');
            const factorBtn = document.getElementById('factorBtn');
            const resultDisplay = document.getElementById('resultDisplay');
            const statusDiv = document.getElementById('statusMsg');

            let isFactoring = false;

            function setStatus(text, isLoading = false, isError = false) {
                if (isError) {
                    statusDiv.innerHTML = `<span class="error">⚠️ ${text}</span>`;
                } else {
                    statusDiv.innerHTML = text;
                }
                if (isLoading) {
                    const spin = '<span class="spinner"></span>';
                    if (!isError) statusDiv.innerHTML = spin + ' ' + text;
                }
            }

            function parseBigIntFromInput(str) {
                str = str.trim();
                if (str === "") return null;
                try {
                    if (str.includes('**')) {
                        let parts = str.split('**');
                        if (parts.length === 2) {
                            let base = BigInt(parts[0]);
                            let exp = parseInt(parts[1], 10);
                            if (!isNaN(exp)) {
                                let val = base ** BigInt(exp);
                                if (str.includes('-')) {
                                    let sub = str.split('-')[1];
                                    if (sub && !isNaN(parseInt(sub, 10))) {
                                        val = val - BigInt(parseInt(sub, 10));
                                    }
                                }
                                return val;
                            }
                        }
                    }
                    return BigInt(str);
                } catch (e) {
                    return null;
                }
            }

            async function performFactorization() {
                if (isFactoring) {
                    setStatus("分解进行中，请稍后...", true);
                    return;
                }
                const rawValue = numberInput.value.trim();
                if (!rawValue) {
                    resultDisplay.innerText = "❌ 请输入一个大于1的整数";
                    setStatus("", false);
                    return;
                }

                let n;
                try {
                    n = parseBigIntFromInput(rawValue);
                    if (n === null) throw new Error("无效数字");
                    if (n < 0n) throw new Error("负数暂不支持，请取绝对值分解");
                    if (n === 0n) throw new Error("0 没有质因数");
                    if (n === 1n) {
                        resultDisplay.innerText = "1 没有质因数 (单位元)";
                        setStatus("", false);
                        return;
                    }
                } catch (e) {
                    resultDisplay.innerText = `❌ 输入错误: ${e.message || "无效的大整数"}`;
                    setStatus("", false);
                    return;
                }

                isFactoring = true;
                factorBtn.disabled = true;
                factorBtn.style.opacity = "0.7";
                resultDisplay.innerText = "⏳ 正在分解大整数，复杂度依赖数值大小，请稍候...";
                setStatus("算法运行中 (Miller-Rabin + Pollard-Rho) ...", true);

                setTimeout(async () => {
                    const startTime = performance.now();
                    try {
                        let factors = [];
                        if (isPrime(n)) {
                            factors = [n];
                        } else {
                            factors = factorizeInteger(n);
                        }
                        const endTime = performance.now();
                        const timeCost = (endTime - startTime).toFixed(2);

                        if (factors.length === 0) {
                            resultDisplay.innerText = `⚠️ 无法分解，请检查整数范围或重试。`;
                            setStatus(`耗时 ${timeCost} 毫秒`, false);
                        } else {
                            const expr = formatFactorization(factors);
                            const originalStr = n.toString();
                            const primeCheck = isPrime(n) ? " (质数)" : "";
                            resultDisplay.innerHTML = `<strong style="color:#0f3b5c;">${originalStr}</strong>${primeCheck} = ${expr}`;
                            let infoMsg = `✔ 分解完成 | ${factors.length} 个质因数 | 耗时 ${timeCost} ms`;
                            if (factors.length > 1 && !isPrime(n)) infoMsg += ` | Pollard-Rho 成功`;
                            setStatus(infoMsg, false);
                        }
                    } catch (err) {
                        console.error(err);
                        resultDisplay.innerText = `💥 分解失败: ${err.message || "算法运行时错误，请尝试较小数字或重试"}`;
                        setStatus("分解出错，可能数字过大算法重试失败", false, true);
                    } finally {
                        isFactoring = false;
                        factorBtn.disabled = false;
                        factorBtn.style.opacity = "1";
                    }
                }, 20);
            }

            function setupExamples() {
                const btns = document.querySelectorAll('.example-btn');
                btns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        let val = btn.getAttribute('data-num');
                        if (val === "2**64-1") {
                            numberInput.value = "18446744073709551615";
                        } else if (val === "9736713594901111241") {
                            numberInput.value = "9736713594901111241";
                        } else if (val === "1111111111111111111") {
                            numberInput.value = "1111111111111111111";
                        } else {
                            numberInput.value = val;
                        }
                        performFactorization();
                    });
                });
            }

            numberInput.addEventListener('input', function (e) {
                let v = e.target.value;
                if (v.includes(',')) {
                    e.target.value = v.replace(/,/g, '');
                }
            });

            factorBtn.addEventListener('click', performFactorization);

            numberInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    performFactorization();
                }
            });

            setupExamples();
            setTimeout(() => {
                if (numberInput.value === "1234567890123456789") {
                    performFactorization();
                }
            }, 100);
        })();
    </script>
</body>

</html>
